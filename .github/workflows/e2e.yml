name: E2E

# Run manually or on demand — not on every push, because E2E needs a
# real Postgres DB and takes significantly longer than unit tests.
on:
  workflow_dispatch:
  schedule:
    # Nightly at 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runner
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agentcenter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://runner:password@localhost:5432/agentcenter_test
      BETTER_AUTH_SECRET: ci-e2e-secret-not-for-production
      BETTER_AUTH_URL: http://localhost:3000
      # R2 / Inngest not exercised in E2E — dummy values prevent startup errors
      CLOUDFLARE_ACCOUNT_ID: dummy
      CLOUDFLARE_R2_BUCKET: dummy
      CLOUDFLARE_R2_ACCESS_KEY_ID: dummy
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: dummy
      INNGEST_EVENT_KEY: dummy

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run database migrations
        run: bun run db:migrate

      - name: Seed test data
        run: bun run db:seed

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build app
        run: bun run build

      - name: Start app server
        run: bun run start &
        env:
          PORT: 3000

      - name: Wait for server to be ready
        run: bunx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: bunx playwright test
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
